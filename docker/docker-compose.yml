services:
  postgres:
    image: postgres:16-alpine
    container_name: vitastore-postgres
    environment:
      POSTGRES_DB: vitastore
      POSTGRES_USER: vitastore
      POSTGRES_PASSWORD: vitastore_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitastore -d vitastore"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: vitastore-api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vitastore
      DB_USER: vitastore
      DB_PASSWORD: vitastore_secret
      DB_POOL_MAX: 20
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
